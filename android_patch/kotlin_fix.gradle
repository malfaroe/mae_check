
// kotlin-stdlib 1.8+ ya incluye jdk7/jdk8; forzamos version uniforme
// para evitar "Duplicate class" cuando plugins traen versiones distintas.
subprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin') {
                details.useVersion '1.8.22'
            }
        }
    }
}
