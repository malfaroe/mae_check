name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          path: source

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Generar estructura Android
        run: |
          flutter create --project-name mae_check --org com.mae mae_check
          cp -r source/lib mae_check/lib
          cp source/pubspec.yaml mae_check/pubspec.yaml

      - name: Instalar dependencias
        working-directory: mae_check
        run: flutter pub get

      - name: Compilar APK
        working-directory: mae_check
        run: flutter build apk --release

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: MAE_Check-${{ github.run_number }}
          path: mae_check/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
